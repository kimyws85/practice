<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습 페이지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --bg-1: #0f172a;
    --bg-2: #1e1b4b;
    --accent: #818cf8;
    --accent-2: #f472b6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    color: #f1f5f9;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), #312e81);
    background-size: 300% 300%;
    animation: gradientShift 12s ease infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: 0;
  }
  .blob-1 {
    width: 340px; height: 340px;
    background: var(--accent);
    top: -80px; left: -80px;
    animation: float 9s ease-in-out infinite;
  }
  .blob-2 {
    width: 300px; height: 300px;
    background: var(--accent-2);
    bottom: -100px; right: -60px;
    animation: float 11s ease-in-out infinite reverse;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 40px); }
  }

  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3.5rem 3rem;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    max-width: 420px;
    margin: 1.5rem;
    animation: rise 0.7s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .emoji {
    font-size: 3rem;
    display: inline-block;
    animation: wave 2.2s ease-in-out infinite;
    transform-origin: 70% 70%;
  }
  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10%, 30% { transform: rotate(14deg); }
    20% { transform: rotate(-8deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(10deg); }
  }

  h1 {
    margin: 1rem 0 0.6rem;
    font-size: 1.9rem;
    font-weight: 900;
    background: linear-gradient(90deg, #e0e7ff, #fbcfe8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  p {
    margin: 0 0 1.6rem;
    color: #cbd5e1;
    line-height: 1.6;
    font-size: 0.98rem;
  }

  .badges {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.35rem 0.85rem;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #e2e8f0;
  }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <span class="emoji">👋</span>
    <h1>안녕하세요!</h1>
    <p>GitHub CLI로 저장소를 만들고<br>GitHub Pages로 배포한 연습 페이지입니다.</p>
    <div class="badges">
      <span class="badge">GitHub CLI</span>
      <span class="badge">GitHub Pages</span>
      <span class="badge">HTML / CSS</span>
    </div>
  </div>
</body>
</html>
