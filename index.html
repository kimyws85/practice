<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습 페이지</title>
<style>
  :root {
    color-scheme: light dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #0f172a;
    color: #f1f5f9;
  }
  .card {
    text-align: center;
    padding: 3rem 2.5rem;
    border-radius: 16px;
    background: #1e293b;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 2rem;
  }
  p {
    margin: 0;
    color: #94a3b8;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>안녕하세요 👋</h1>
    <p>GitHub CLI로 만들고 배포한 연습 페이지입니다.</p>
  </div>
</body>
</html>
